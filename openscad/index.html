<script>
    // 1. Initialize the Virtual File System
    var virtualFileSystem = [{ name: "main.scad", txt: "// Loading..." }];
    var currentVirtualFileName = "main.scad";
    
    // Globals for the 3D Engine
    var meshWire;
    var meshSolid;
    var openPartID = "local"; 
    var openPartRev = "1";

    // 2. Helper to get URL params
    function param(name) {
        return (location.search.split(name + '=')[1] || '').split('&')[0];
    }

    // 3. The "Fetch from GitHub" Logic
    async function loadFromURL() {
        const targetFile = param("file");
        const url = targetFile ? decodeURIComponent(targetFile) : null;

        if (url) {
            virtualFileSystem[0].txt = "// Fetching from GitHub...\n// Please wait.";
            if (window.editor) window.editor.setValue(virtualFileSystem[0].txt);

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response was not ok");
                const text = await response.text();
                
                virtualFileSystem[0].txt = text;
                if (window.editor) window.editor.setValue(text);

                // Try to auto-run if the engine is ready
                if (typeof window.runAndShowScad === 'function') {
                    console.log("File loaded. Auto-running...");
                    window.runAndShowScad();
                }

            } catch (error) {
                console.error("Failed to load file:", error);
                virtualFileSystem[0].txt = "// Error loading file:\n// " + error.message;
                if (window.editor) window.editor.setValue(virtualFileSystem[0].txt);
            }
        } else {
            virtualFileSystem[0].txt = `// Welcome to the BIFL Viewer!
// Add ?file=RAW_GITHUB_URL to the URL to load a model.
difference() {
    cube(20, center=true);
    sphere(12);
}`;
        }
    }

    // 4. This draws the STL
    async function ShowMeThatStinkingStlFile(currentSTL) {
        window.currentSTL = currentSTL;
        try {
            SceneHandler.getScene("scene-0").scene.children = [SceneHandler.getScene("scene-0").scene.children[0]];
        } catch(e) { console.log("Scene clear error (harmless):", e); }

        const loader = new THREE.STLLoader();
        var geometry = loader.parse(currentSTL);

        // Keep view settings if they exist
        let oldOpacity = 0.95;
        let oldWireVisible = true;
        let oldSolidVisible = true;
        
        if (typeof meshSolid !== 'undefined' && meshSolid.material) {
             oldOpacity = meshSolid.material.opacity;
             oldSolidVisible = meshSolid.visible;
        }
        if (typeof meshWire !== 'undefined') {
             oldWireVisible = meshWire.visible;
        }

        meshWire = new THREE.Mesh(geometry, new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true, }));
        meshSolid = new THREE.Mesh(geometry, new THREE.MeshNormalMaterial({ transparent: true, opacity: oldOpacity }));

        meshWire.visible = oldWireVisible;
        meshSolid.visible = oldSolidVisible;

        // Rotate to match OpenSCAD Z-up
        meshWire.rotateX(-Math.PI / 2);
        meshSolid.rotateX(-Math.PI / 2);

        // Center it
        var box = new THREE.Box3().setFromObject(meshSolid);
        var meshTranslationInY = box.getSize().y / 2;
        meshWire.translateZ(meshTranslationInY);
        meshSolid.translateZ(meshTranslationInY);

        await Engine.addToScene(meshWire, 'scene-0');
        await Engine.addToScene(meshSolid, 'scene-0');
        window.firstRenderDone = true;
    }

    function download(filename, content) {
        // Create a blob from the content (works for both text and binary)
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        
        // Create a temporary link to trigger the download
        const element = document.createElement('a');
        element.href = url;
        element.download = filename;
        element.style.display = 'none';
        document.body.appendChild(element);
        
        element.click();
        
        // Cleanup
        document.body.removeChild(element);
        URL.revokeObjectURL(url);
    }
    
    // 5. Dummy helpers
    function storeOpenSCADfileToCloud() { alert("Cloud save disabled."); }
    function doLogin() { alert("No login required!"); }
    
    // Initialize Scene
    Engine.createScene({ containerId: 'canvas-container', showGrid: false });
    
</script>


<script type="module">
    import OpenScad from "./openscad.js";
    import { addFonts } from "./openscad.fonts.js";
    import { registerOpenSCADLanguage } from './openscad-editor-config.js'

    // 1. Setup Monaco Editor
    async function setUpMonacoEditor() {
        await loadFromURL(); 

        await require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.26.1/min/vs' } });

        await require(["vs/editor/editor.main"], async () => {
            await registerOpenSCADLanguage();
            window.editor = await monaco.editor.create(document.getElementById('monacoEditor'), {
                value: virtualFileSystem[0].txt,
                language: 'openscad',
                theme: 'vs-dark',
                automaticLayout: true 
            });

            window.editor.onDidChangeModelContent(() => {
                virtualFileSystem[0].txt = window.editor.getValue();
            });
        });
    }

    await setUpMonacoEditor();

    // 2. The Runner Function
    const openSCADconsoleOutput = document.getElementById("consoleOutput");

    window.runAndShowScad = async function() {
        // ERROR FIX: Manually sync instead of calling the missing function
        if(window.editor) virtualFileSystem[0].txt = window.editor.getValue();
        
        openSCADconsoleOutput.innerHTML = "Processing..."; 
        $("#globalDimmScreen").show();

        try {
            const instance = await OpenScad({
                noInitialRun: true,
                'print': text => { openSCADconsoleOutput.innerHTML += text + "\n"; },
                'printErr': text => { openSCADconsoleOutput.innerHTML += text + "\n"; },
            });

            addFonts(instance);

            await virtualFileSystem.forEach(async (item) => {
                 await instance.FS.writeFile("/" + item.name, item.txt);
            });

            let openSCADarguments = ["/main.scad", "-o", "cube.stl"];
            await instance.callMain(openSCADarguments);

            const output = await new Blob([await instance.FS.readFile("/cube.stl")]).text();
            
            // This calls the function we restored in Fix 1
            ShowMeThatStinkingStlFile(output);
            
            openSCADconsoleOutput.innerHTML += "\nDone!";

        } catch (e) {
            console.error(e);
            openSCADconsoleOutput.innerHTML += "\nError: " + e;
        }

        $("#globalDimmScreen").hide();
    }

    // 3. Connect Buttons
    document.getElementById("runOpenSCAD").onclick = function () { window.runAndShowScad() };

    // 4. Auto-Run after 1 second
    setTimeout(() => {
        if(virtualFileSystem[0].txt.length > 50) { // Only run if we actually loaded something
             window.runAndShowScad();
        }
    }, 1500);
</script>
