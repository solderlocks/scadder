name: Auto-Generate Screenshots
on:
  workflow_dispatch: # 👈 THIS creates the "Run workflow" button
  push:
    branches:
      - main
    paths:
      - "core/library.json" # ONLY run when the library changes

permissions:
  contents: write

jobs:
  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Snapshot Dependencies
        run: npm install puppeteer http-server --no-save

      - name: Start Local Server
        run: |
          npx http-server . -p 8080 &
          echo "Server started on 8080"
          sleep 5

      - name: Run Snapshot Script
        env:
          BASE_URL: "http://localhost:8080/web/index.html"
        run: node web/scripts/snap.cjs

      - name: Commit and Push New Images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📸 Auto-generated screenshots for library update"
          file_pattern: "web/assets/previews/*.png core/library.json"
