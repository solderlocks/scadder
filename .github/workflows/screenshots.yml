name: Auto-Generate Screenshots
on:
  push:
    paths:
      - 'openscad/library.json'  # ONLY run when the library changes
    branches:
      - main

permissions:
  contents: write      # Allow the robot to commit changes back

jobs:
  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer http-server

      - name: Start Local Server
        run: |
          # Start a simple server on port 8080 in the background (&)
          npx http-server . -p 8080 &
          echo "Server started on 8080"
          sleep 5 # Give it a moment to boot up

      - name: Run Snapshot Script
        env:
          # FIX 1: Point to the subdirectory where the REAL app lives
          BASE_URL: 'http://localhost:8080/openscad/index.html' 
        run: node scripts/snap.js

      - name: Commit and Push New Images
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "📸 Auto-generated screenshots for library update"
          # FIX 2: Look for images inside the openscad folder now
          file_pattern: "openscad/assets/previews/*.png openscad/library.json"