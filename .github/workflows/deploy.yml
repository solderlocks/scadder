name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - "core/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto-Generate Screenshots"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Deployment Directory
        run: |
          mkdir _site

          # 1. Move contents and core
          cp -r web/* _site/
          cp -r core _site/core

          # 2. Disable Jekyll processing so GitHub doesn't drop files
          touch _site/.nojekyll

          # 3. Create the redirect map for the old /web/ path
          mkdir -p _site/web
          cat << 'EOF' > _site/web/index.html
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <meta http-equiv="refresh" content="0; url=https://scadder.dev/">
              <script>
                const newUrl = "https://scadder.dev/" + window.location.search + window.location.hash;
                window.location.replace(newUrl);
              </script>
            </head>
            <body style="background: #111; color: #fff; font-family: monospace; padding: 2rem;">
              <p>Redirecting to <a href="https://scadder.dev/" style="color: #4da6ff;">scadder.dev</a>...</p>
            </body>
          </html>
          EOF

          # 4. Copy the redirect to web.html to catch exact /web routes
          cp _site/web/index.html _site/web.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
