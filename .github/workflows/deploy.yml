name: 🚀 Sync to Hostinger
on:
  push:
    branches:
      - main 

jobs:
  web-deploy:
    name: 🎉 Sync
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Since the user lands in the real public_html, this creates the scadder folder right next to portfolio
        server-dir: ./scadder/
        # Pushes your whole repo contents into that folder
        local-dir: ./ 
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          README.md
          .github/**
          .vscode/** 