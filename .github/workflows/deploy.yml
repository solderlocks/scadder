name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    # Only run this if files in web or core change, to save action minutes
    paths:
      - "web/**"
      - "core/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Deployment Directory
        run: |
          mkdir _site
          # 1. Move everything inside /web to the root of /_site
          cp -r web/* _site/
          # 2. Copy the /core folder to the root of /_site so relative paths still resolve
          cp -r core _site/core

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
