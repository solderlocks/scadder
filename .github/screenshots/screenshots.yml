name: Auto-Generate Screenshots
on:
  push:
    paths:
      - 'openscad/library.json' # This path looks correct based on your file structure
    branches:
      - main

permissions:
  contents: write

jobs:
  snap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm init -y
          npm install puppeteer http-server

      - name: Ensure Assets Directory Exists
        run: mkdir -p assets/previews

      - name: Start Local Server
        run: |
          # "." means serve the current directory (repo root)
          npx http-server . -p 8080 &
          echo "Server started on 8080"
          sleep 5

      - name: Run Snapshot Script
        env:
          # FIX: The robot sees index.html at the root, on port 8080
          BASE_URL: 'http://localhost:8080/index.html' 
        run: node scripts/snap.js

      - name: Commit and Push New Images
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "📸 Auto-generated screenshots for library update"
          file_pattern: "assets/previews/*.png openscad/library.json"